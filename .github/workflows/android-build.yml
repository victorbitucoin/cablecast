name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK components
        run: |
          yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" --sdk_root=$ANDROID_HOME

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        id: build-debug
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee gradle-output.log
        continue-on-error: true

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: gradle-build-log
          path: android/gradle-output.log

      - name: Check APK exists
        id: check-apk
        run: |
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "apk_found=true" >> $GITHUB_OUTPUT
          else
            echo "apk_found=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload APK artifact
        if: steps.check-apk.outputs.apk_found == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: cablecast-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Build release APK (unsigned)
        if: steps.check-apk.outputs.apk_found == 'true'
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload release APK artifact
        if: steps.check-apk.outputs.apk_found == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: cablecast-android-release-unsigned
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
