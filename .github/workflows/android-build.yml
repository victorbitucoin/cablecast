name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'tools platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        id: build-debug
        run: |
          ANDROID_HOME=$ANDROID_HOME ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1 | tee gradle-output.log
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Print build error annotations
        if: always()
        run: |
          # Output error annotations - these appear on the workflow run page
          grep -n -E "(error:|cannot find|cannot access|unresolved reference|: Error|FAILED|Exception|e: )" gradle-output.log | head -40 | while IFS=: read linenum line; do
            echo "::error file=build.log,line=$linenum,title=Gradle Error::$(echo $line | tr -d '\n' | head -c 200)"
          done
          # Also output the last lines
          echo "::group::Last 20 lines"
          tail -20 gradle-output.log
          echo "::endgroup::"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: gradle-build-log
          path: android/gradle-output.log

      - name: Check build result
        if: steps.build-debug.outcome != 'success'
        run: |
          echo "Build failed. See gradle-build-log artifact for details."
          exit 1

      - name: Upload debug APK
        uses: actions/upload-artifact@v5
        with:
          name: cablecast-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Build release APK (unsigned)
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload release APK
        uses: actions/upload-artifact@v5
        with:
          name: cablecast-android-release-unsigned
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
