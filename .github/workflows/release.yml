name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin
      - uses: android-actions/setup-android@v3
      - name: Install required SDK components
        run: yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" --sdk_root=$ANDROID_HOME
      - run: chmod +x gradlew
      - run: ./gradlew assembleRelease --no-daemon --stacktrace
      - uses: actions/upload-artifact@v5
        with:
          name: app-release-unsigned
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk

  build-pc:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: pc
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      - run: npm run dist
      - uses: actions/upload-artifact@v5
        with:
          name: pc-installer
          path: pc/dist/CableCast-Setup.exe

  create-release:
    needs: [build-android, build-pc]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: app-release-unsigned
          path: release-artifacts
      - uses: actions/download-artifact@v5
        with:
          name: pc-installer
          path: release-artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/app-release-unsigned.apk
            release-artifacts/CableCast-Setup.exe
          generate_release_notes: true
